<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Module — fiche</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  :root{
    --canvas:#EFEDE7; --panel:#FFFFFF; --ink:#1B1B18; --muted:#6E6A62; --faint:#9B968C;
    --line:#E5E1D7; --ph:#EDE9DF; --ph-2:#E1DACB;
    --signal:#FF5A1F; --signal-hover:#E64E17; --signal-soft:#FFE4D3; --signal-ink:#7A2A0D;
    --steel:#33414C; --steel-soft:#E7EBEC; --steel-line:#C6D0D4;
    --sans:"Inter",system-ui,sans-serif; --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--canvas);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .stage{max-width:920px;margin:0 auto;padding:32px 20px 60px}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 2px 16px}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;text-decoration:none}
  .back .ico{width:16px;height:16px}
  .mark{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--faint)}
  .mark b{color:var(--signal)}
  .card{background:var(--panel);border-radius:14px;overflow:hidden;
    box-shadow:0 1px 2px rgba(23,25,28,.04), 0 18px 40px rgba(23,25,28,.09)}
  .ico{stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .ph-icon{color:#C9C2B2}
  .wrap{display:flex}
  .gal{width:42%;flex:none;padding:20px;display:flex;flex-direction:column}
  .hero{aspect-ratio:1/1;border-radius:10px;overflow:hidden;
    background:linear-gradient(135deg,var(--ph) 0%,var(--ph-2) 100%);display:grid;place-items:center}
  .hero .ico{width:34px;height:34px;stroke-width:1.3}
  .cta{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--signal);color:#fff;
    border:none;border-radius:9px;padding:13px 18px;font-family:var(--sans);font-weight:600;
    font-size:14px;margin-top:16px;cursor:pointer;width:100%}
  .cta:hover{background:var(--signal-hover)}
  .cta .ico{width:16px;height:16px}
  .content{flex:1;min-width:0;padding:22px 24px 22px 6px;border-left:1px solid var(--line)}
  .eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--steel);margin-bottom:9px}
  .title{font-size:23px;font-weight:700;letter-spacing:-.01em;margin:0 0 12px}
  .badges{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
  .badge{height:24px;border-radius:99px;padding:0 13px;display:flex;align-items:center;
    font-size:12.5px;font-weight:500}
  .badge.a{background:var(--steel-soft);color:var(--steel)}
  .badge.b{background:#F1F1EF;color:var(--muted)}
  .badge.kit{background:var(--signal-soft);color:var(--signal-ink);font-weight:700}
  h2{font-size:13.5px;font-weight:600;margin:0 0 11px;color:var(--ink)}
  .section{margin-top:22px;padding-top:18px;border-top:1px solid var(--line)}
  .section:first-of-type{margin-top:0;padding-top:0;border-top:none}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .link-row{display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:15px 0;border-top:1px solid var(--line)}
  .link-row:first-of-type{border-top:none;padding-top:0}
  .link-left{display:flex;align-items:center;gap:10px;min-width:0}
  .link-left .ico{width:18px;height:18px;color:var(--steel);flex:none}
  .link-txt .lbl{font-size:14px;font-weight:500;color:var(--ink)}
  .link-txt .count{font-size:12px;color:var(--faint);margin-top:2px}
  .btn-out{display:inline-flex;align-items:center;gap:6px;background:var(--panel);color:var(--steel);
    border:1.5px solid var(--steel-line);border-radius:99px;padding:9px 15px;font-family:var(--sans);
    font-weight:600;font-size:13px;cursor:pointer;flex:none;white-space:nowrap}
  .btn-out:hover{border-color:var(--steel);background:var(--steel-soft)}
  .btn-out .ico{width:14px;height:14px}
  .btn-out.full{width:100%;justify-content:center;padding:12px 15px;margin-top:10px}
</style>
</head>
<body>
<script src="shared.js"></script>
<div class="stage">
  <div class="topbar">
    <a class="back" href="#"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m11 6-6 6 6 6"/></svg>Modules</a>
    <span class="mark"><b>Linéo</b></span>
  </div>

  <div class="card">
    <div class="wrap">

      <div class="gal">
        <div class="hero">
          <svg class="ico ph-icon" viewBox="0 0 24 24"><path d="M12 3.5 20 8v8l-8 4.5L4 16V8l8-4.5Z"/><path d="M4 8l8 4.5L20 8M12 12.5V21"/></svg>
        </div>

        <a class="cta" href="acteurs-fiche.html">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6"/><path d="M17 8h5M19.5 5.5v5"/></svg>
          Assigner un prestataire
        </a>
        <button class="btn-out full" onclick="showToast('Module associé au projet')">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 14.5 14.5 9.5"/><path d="M11 6.5 12.6 5a4 4 0 0 1 5.7 5.7l-1.6 1.6"/><path d="M13 17.5 11.4 19a4 4 0 0 1-5.7-5.7l1.6-1.6"/></svg>
          Associer à un projet
        </button>
      </div>

      <div class="content">
        <div class="eyebrow" id="objet"></div>
        <h1 class="title" id="nom"></h1>

        <div class="badges" id="badges"></div>

        <div class="section" style="margin-top:0;padding-top:0;border-top:none">
          <h2>Métiers requis</h2>
          <div class="chips" id="metiers"></div>
        </div>

        <div class="section">
          <div class="link-row">
            <div class="link-left">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5"/><path d="M16 4.3a3 3 0 0 1 0 5.9M21 20c0-2.8-1.9-4.8-4.5-5.4"/></svg>
              <div class="link-txt"><div class="lbl">Prestataires</div><div class="count" id="prest-count"></div></div>
            </div>
            <a class="btn-out" href="acteurs-fiche.html">Voir les prestataires<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg></a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
const MODULE = {
  objet: "Banc trois assises",
  nom: "Pietement",
  statut: "Prototype",
  est_kit: true,
  metiers: ["Menuisier", "Serrurier"],
  prestatairesCount: 1
};

function renderModule(m){
  document.getElementById("objet").textContent = "Objet : " + (m.objet || "");
  document.getElementById("nom").textContent = m.nom || "";
  document.getElementById("prest-count").textContent = (m.prestatairesCount || 0) + " prestataire(s) assigne(s)";

  var badges = document.getElementById("badges");
  badges.innerHTML = "";
  if(m.statut){
    var b = document.createElement("span");
    b.className = "badge a";
    b.textContent = m.statut;
    badges.appendChild(b);
  }
  if(m.est_kit){
    var k = document.createElement("span");
    k.className = "badge kit";
    k.textContent = "Kit";
    badges.appendChild(k);
  }

  var chips = document.getElementById("metiers");
  chips.innerHTML = "";
  (m.metiers || []).forEach(function(txt){
    var c = document.createElement("span");
    c.className = "badge b";
    c.textContent = txt;
    chips.appendChild(c);
  });
  if(!(m.metiers || []).length){
    chips.innerHTML = '<p style="font-size:13px;color:var(--faint);margin:0">Aucun metier associe pour le moment.</p>';
  }
}

renderModule(MODULE);
</script>
</body>
</html>
