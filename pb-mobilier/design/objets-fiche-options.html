<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Objet — 3 propositions de mise en page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#EAEBE7; --panel:#FFFFFF; --ink:#17191C; --muted:#6A6F75; --faint:#9AA0A6;
    --line:#E4E6E8; --ph:#EDEAE4; --ph-2:#E3DFD6;
    --wood:#96683C; --wood-soft:#F3E9DC;
    --ok-soft:#E9F1E8;
    --sans:"Inter",system-ui,sans-serif; --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--canvas);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .page{max-width:1360px;margin:0 auto;padding:30px 24px 70px}
  .intro{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-bottom:22px}
  .row{display:flex;gap:26px;align-items:flex-start;flex-wrap:wrap}
  .opt{flex:1 1 380px;max-width:430px}
  .opt-label{font-family:var(--mono);font-size:11px;color:var(--wood);margin:0 0 10px;
    display:flex;align-items:center;gap:8px}
  .opt-label b{color:var(--ink);font-weight:600;font-family:var(--sans);font-size:13.5px}

  .card{background:var(--panel);border-radius:12px;overflow:hidden;
    box-shadow:0 1px 2px rgba(23,25,28,.04), 0 14px 30px rgba(23,25,28,.08)}
  .ico{stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .ph-icon{color:#C8C2B6}
  .imgblock{background:linear-gradient(135deg,var(--ph) 0%,var(--ph-2) 100%);display:grid;place-items:center}

  /* ============ OPTION A — verticale ============ */
  .a-hero{aspect-ratio:4/3;position:relative}
  .a-hero .ico{width:30px;height:30px;stroke-width:1.3}
  .a-thumbs{display:flex;gap:6px;padding:9px 12px 0}
  .a-thumb{width:40px;height:40px;border-radius:7px;background:var(--ph);display:grid;place-items:center;border:2px solid transparent}
  .a-thumb.on{border-color:var(--wood)}
  .a-thumb .ico{width:13px;height:13px;stroke-width:1.4}
  .a-body{padding:16px 18px 20px}
  .eyebrow{width:84px;height:9px;border-radius:99px;background:var(--wood-soft);margin-bottom:9px}
  .title{height:20px;width:75%;border-radius:4px;background:#E7E4DD;margin-bottom:11px}
  .badges{display:flex;gap:6px;margin-bottom:12px}
  .badge{height:19px;border-radius:99px;padding:0 10px;display:flex;align-items:center}
  .badge.ok{background:var(--ok-soft)}.badge.ok i{width:38px;height:6px;border-radius:99px;background:#A9C4AC;display:block}
  .badge.nt{background:#F1F1EF}.badge.nt i{width:30px;height:6px;border-radius:99px;background:#C7C7C2;display:block}
  .facts{display:flex;gap:14px;color:var(--muted);font-size:12px;margin-bottom:16px}
  .fact{display:flex;align-items:center;gap:5px}
  .fact .ico{width:13px;height:13px;color:var(--faint);stroke-width:1.6}
  .fact .val{width:32px;height:8px;border-radius:99px;background:#E2E0DA}
  .sect{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .sect h2{font-size:12.5px;font-weight:600;margin:0 0 9px}
  .dline{height:8px;border-radius:99px;background:#EDEAE4;margin-bottom:6px}
  .dline:last-child{width:60%;margin-bottom:0}
  .swrow{display:flex;gap:11px}
  .sw{width:26px;height:26px;border-radius:50%}
  .sw.a{background:#C9A46A}.sw.b{background:#8B5E34}.sw.c{background:#D8C39C}
  .realmini{display:flex;gap:8px}
  .realcard{flex:1;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .realcard .im{aspect-ratio:4/3;background:var(--ph);display:grid;place-items:center}
  .realcard .im .ico{width:13px;height:13px;stroke-width:1.4}
  .realcard .tx{padding:7px 8px 9px}
  .realcard .l1{height:7px;width:75%;border-radius:99px;background:#E2E0DA;margin-bottom:5px}
  .realcard .l2{height:6px;width:48%;border-radius:99px;background:#EDEAE4}

  /* ============ OPTION B — catalogue 2 colonnes ============ */
  .b-wrap{display:flex}
  .b-gal{width:42%;flex:none;padding:14px}
  .b-hero{aspect-ratio:1/1;border-radius:8px}
  .b-hero .ico{width:24px;height:24px;stroke-width:1.3}
  .b-thumbs{display:flex;gap:6px;margin-top:7px}
  .b-thumb{width:32px;height:32px;border-radius:6px;background:var(--ph);flex:none;border:2px solid transparent}
  .b-thumb.on{border-color:var(--wood)}
  .b-content{flex:1;min-width:0;padding:16px 16px 16px 4px;border-left:1px solid var(--line)}

  /* ============ OPTION C — éditoriale bandeau ============ */
  .c-hero{aspect-ratio:16/8;position:relative}
  .c-hero .ico{width:28px;height:28px;stroke-width:1.3}
  .c-cap{position:absolute;left:14px;bottom:14px;right:70px;background:rgba(255,255,255,.92);
    border-radius:8px;padding:9px 12px}
  .c-cap .title{height:15px;width:66%;margin:0}
  .c-content{padding:16px 18px 20px;display:flex;gap:18px}
  .c-main{flex:1.4;min-width:0}
  .c-side{flex:1;min-width:0;border-left:1px solid var(--line);padding-left:16px}
  .c-side h2{font-size:11.5px;font-weight:600;margin:0 0 9px}
  .c-side .swrow{margin-bottom:16px}
  .c-side .sw{width:22px;height:22px}
  .c-side .realcard{margin-bottom:8px}
  .c-facts{display:flex;gap:12px;color:var(--muted);font-size:11.5px;margin-bottom:12px}
</style>
</head>
<body>
<div class="page">
  <div class="intro">Objet — fiche détail · 3 propositions de mise en page (aucune donnée réelle)</div>
  <div class="row">

    <!-- ============ OPTION A ============ -->
    <div class="opt">
      <p class="opt-label"><b>A</b> — verticale, image en tête</p>
      <div class="card">
        <div class="imgblock a-hero"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div>
        <div class="a-thumbs">
          <div class="a-thumb on"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div>
          <div class="a-thumb"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div>
          <div class="a-thumb"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div>
        </div>
        <div class="a-body">
          <div class="eyebrow"></div>
          <div class="title"></div>
          <div class="badges">
            <div class="badge ok"><i></i></div>
            <div class="badge nt"><i></i></div>
          </div>
          <div class="facts">
            <div class="fact"><svg class="ico" viewBox="0 0 24 24"><path d="M3 16.5 16.5 3l4.5 4.5L7.5 21 3 16.5Z"/><path d="m14 6 2 2M11 9l2 2M8 12l2 2"/></svg><div class="val"></div></div>
            <div class="fact"><svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5v9"/></svg><div class="val"></div></div>
          </div>
          <div class="sect">
            <h2>Description</h2>
            <div class="dline"></div><div class="dline"></div><div class="dline"></div>
          </div>
          <div class="sect">
            <h2>Essences</h2>
            <div class="swrow"><div class="sw a"></div><div class="sw b"></div><div class="sw c"></div></div>
          </div>
          <div class="sect">
            <h2>Réalisations</h2>
            <div class="realmini">
              <div class="realcard"><div class="im"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div><div class="tx"><div class="l1"></div><div class="l2"></div></div></div>
              <div class="realcard"><div class="im"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div><div class="tx"><div class="l1"></div><div class="l2"></div></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ============ OPTION B ============ -->
    <div class="opt">
      <p class="opt-label"><b>B</b> — catalogue, deux colonnes</p>
      <div class="card">
        <div class="b-wrap">
          <div class="b-gal">
            <div class="imgblock b-hero"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div>
            <div class="b-thumbs">
              <div class="b-thumb on"></div><div class="b-thumb"></div><div class="b-thumb"></div>
            </div>
          </div>
          <div class="b-content">
            <div class="eyebrow"></div>
            <div class="title" style="width:88%"></div>
            <div class="badges">
              <div class="badge ok"><i></i></div>
              <div class="badge nt"><i></i></div>
            </div>
            <div class="facts" style="flex-direction:column;align-items:flex-start;gap:7px">
              <div class="fact"><svg class="ico" viewBox="0 0 24 24"><path d="M3 16.5 16.5 3l4.5 4.5L7.5 21 3 16.5Z"/><path d="m14 6 2 2M11 9l2 2M8 12l2 2"/></svg><div class="val" style="width:46px"></div></div>
              <div class="fact"><svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5v9"/></svg><div class="val" style="width:46px"></div></div>
            </div>
            <div class="sect">
              <h2>Description</h2>
              <div class="dline"></div><div class="dline"></div>
            </div>
            <div class="sect">
              <h2>Essences</h2>
              <div class="swrow"><div class="sw a" style="width:22px;height:22px"></div><div class="sw b" style="width:22px;height:22px"></div></div>
            </div>
          </div>
        </div>
        <div class="sect" style="margin:0 16px 16px">
          <h2>Réalisations</h2>
          <div class="realmini">
            <div class="realcard"><div class="im"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div><div class="tx"><div class="l1"></div><div class="l2"></div></div></div>
            <div class="realcard"><div class="im"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div><div class="tx"><div class="l1"></div><div class="l2"></div></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ============ OPTION C ============ -->
    <div class="opt">
      <p class="opt-label"><b>C</b> — éditoriale, bandeau plein cadre</p>
      <div class="card">
        <div class="imgblock c-hero">
          <svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg>
          <div class="c-cap"><div class="title"></div></div>
        </div>
        <div class="c-content">
          <div class="c-main">
            <div class="c-facts">
              <div class="fact"><svg class="ico" viewBox="0 0 24 24"><path d="M3 16.5 16.5 3l4.5 4.5L7.5 21 3 16.5Z"/><path d="m14 6 2 2M11 9l2 2M8 12l2 2"/></svg><div class="val"></div></div>
              <div class="fact"><svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5v9"/></svg><div class="val"></div></div>
            </div>
            <div class="badges" style="margin-bottom:14px">
              <div class="badge ok"><i></i></div>
              <div class="badge nt"><i></i></div>
            </div>
            <h2 style="font-size:12px;font-weight:600;margin:0 0 9px">Description</h2>
            <div class="dline"></div><div class="dline"></div><div class="dline"></div>
          </div>
          <div class="c-side">
            <h2>Essences</h2>
            <div class="swrow"><div class="sw a"></div><div class="sw b"></div><div class="sw c"></div></div>
            <h2>Réalisations</h2>
            <div class="realcard"><div class="im"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div><div class="tx"><div class="l1"></div><div class="l2"></div></div></div>
            <div class="realcard"><div class="im"><svg class="ico ph-icon" viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="1.5"/><circle cx="9" cy="10" r="1.6"/><path d="m4 18 5.5-5.5a1.8 1.8 0 0 1 2.5 0L20 20"/></svg></div><div class="tx"><div class="l1"></div><div class="l2"></div></div></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
