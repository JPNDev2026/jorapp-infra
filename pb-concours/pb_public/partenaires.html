<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Commer&ccedil;ants partenaires &mdash; Concours PNJ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap');

  :root {
    --teal: #1F6481;
    --teal-deep: #16475c;
    --lime: #D7E337;
    --encre: #142228;
    --parchemin: #EDE0BC;
    --blanc: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0 }

  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: var(--teal);
    color: var(--encre);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px 40px;
    gap: 18px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% -10%, rgba(215,227,55,.10) 0%, transparent 45%),
      linear-gradient(180deg, transparent 60%, rgba(20,34,40,.18) 100%);
    pointer-events: none;
  }

  .head { text-align: center; color: var(--blanc); margin-bottom: 2px }
  .head img { height: 46px; width: auto; margin-bottom: 12px; filter: drop-shadow(0 2px 6px rgba(0,0,0,.25)) }
  .head h1 { font-size: 22px; font-weight: 700; letter-spacing: -.01em }
  .head p { font-size: 18px; color: rgba(255,255,255,.72); margin-top: 4px }

  .list { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px }

  .partner {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--blanc);
    border-radius: 14px;
    padding: 14px 16px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 6px 22px rgba(20,34,40,.18);
    transition: transform .1s, box-shadow .15s;
  }
  a.partner { cursor: pointer }
  a.partner:active { transform: scale(.99) }
  a.partner:hover { box-shadow: 0 8px 26px rgba(20,34,40,.26) }

  .logo-box {
    flex: 0 0 56px;
    width: 56px;
    height: 56px;
    border-radius: 10px;
    background: var(--blanc);
    border: 1px solid rgba(31,100,129,.15);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .logo-box img { max-width: 48px; max-height: 48px; width: auto; height: auto; object-fit: contain }

  .info { flex: 1; min-width: 0 }
  .info .nom { font-size: 15.5px; font-weight: 700; letter-spacing: -.01em; line-height: 1.25 }
  .info .loc {
    font-size: 12.5px;
    color: var(--teal-deep);
    opacity: .8;
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .chevron { flex: 0 0 auto; color: var(--teal); font-size: 22px; font-weight: 700; opacity: .55 }

  .state { color: rgba(255,255,255,.85); font-size: 14px; text-align: center; padding: 30px 0 }

  .btn-ghost {
    width: 100%;
    max-width: 420px;
    margin-top: 6px;
    padding: 13px;
    border: 1.5px solid rgba(255,255,255,.35);
    border-radius: 10px;
    background: transparent;
    color: var(--blanc);
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .btn-ghost:hover { background: rgba(255,255,255,.1) }
</style>
</head>
<body>

  <div class="head">
    <img src="/assets/Logo_feuille.png" alt="Parc naturel du Jorat">
    <h1>Commer&ccedil;ants partenaires</h1>
    <p>Choisissez un commer&ccedil;ant. On vous guide vers lui.</p>
  </div>

  <div class="list" id="list">
    <div class="state" id="state">Chargement&hellip;</div>
  </div>

  <button class="btn-ghost" id="back">Retour</button>

<script>
  function mapsUrl(loc) {
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(loc);
  }

  function pin() {
    return '\uD83D\uDCCD';
  }

  function render(partenaires) {
    const list = document.getElementById('list');
    list.innerHTML = '';

    if (!partenaires.length) {
      const s = document.createElement('div');
      s.className = 'state';
      s.textContent = 'Aucun commerçant partenaire pour le moment.';
      list.appendChild(s);
      return;
    }

    partenaires.forEach(function (p) {
      const hasLoc = !!p.localisation;
      const card = document.createElement(hasLoc ? 'a' : 'div');
      card.className = 'partner';
      if (hasLoc) {
        card.href = mapsUrl(p.localisation);
        card.target = '_blank';
        card.rel = 'noopener';
      }

      const box = document.createElement('div');
      box.className = 'logo-box';
      const img = document.createElement('img');
      img.alt = p.nom_complet || '';
      img.onerror = function () { img.src = '/assets/Logo_feuille.png'; };
      img.src = p.logo_url || '/assets/Logo_feuille.png';
      box.appendChild(img);

      const info = document.createElement('div');
      info.className = 'info';
      const nom = document.createElement('div');
      nom.className = 'nom';
      nom.textContent = p.nom_complet || 'Commerçant partenaire';
      info.appendChild(nom);
      if (p.localisation) {
        const loc = document.createElement('div');
        loc.className = 'loc';
        loc.textContent = pin() + ' ' + p.localisation;
        info.appendChild(loc);
      }

      card.appendChild(box);
      card.appendChild(info);

      if (hasLoc) {
        const chev = document.createElement('div');
        chev.className = 'chevron';
        chev.textContent = '\u203A';
        card.appendChild(chev);
      }

      list.appendChild(card);
    });
  }

  fetch('/partners')
    .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function (d) { render(d.partenaires || []); })
    .catch(function () {
      document.getElementById('state').textContent = 'Impossible de charger la liste.';
    });

  document.getElementById('back').addEventListener('click', function () {
    if (history.length > 1) history.back(); else location.href = '/';
  });
</script>
</body>
</html>
