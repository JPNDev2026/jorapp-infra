<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Merci &mdash; Concours PNJ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap');
  :root { --teal:#1F6481; --teal-deep:#16475c; --lime:#D7E337; --encre:#142228; --blanc:#ffffff; }
  * { box-sizing:border-box; margin:0; padding:0 }
  body {
    font-family:'DM Sans',system-ui,-apple-system,sans-serif;
    background:var(--teal); color:var(--encre);
    display:flex; flex-direction:column; min-height:100vh;
    align-items:center; justify-content:center; padding:28px 24px; gap:18px;
    position:relative;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(circle at 50% -10%, rgba(215,227,55,.10) 0%, transparent 45%),
      linear-gradient(180deg, transparent 60%, rgba(20,34,40,.18) 100%);
    pointer-events:none;
  }
  .logo-chip {
    background:var(--blanc); border-radius:16px;
    padding:20px 24px; box-shadow:0 8px 30px rgba(20,34,40,.25);
    max-width:260px; width:100%;
    display:flex; align-items:center; justify-content:center;
  }
  .logo-chip img { width:100%; height:auto; max-height:none; display:block }

  .card { background:var(--blanc); border-radius:16px; max-width:360px; width:100%; padding:36px 28px; text-align:center; box-shadow:0 8px 30px rgba(20,34,40,.25); }
  h1 { font-size:22px; font-weight:700; letter-spacing:-.01em; margin-bottom:10px }
  p  { font-size:18px; color:var(--teal-deep); line-height:1.55; opacity:.85 }
  p strong { color:var(--teal); font-weight:700 }
  .btn { max-width:360px; width:100%; padding:16px; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; background:var(--lime); color:var(--encre); transition:transform .1s, filter .15s; }
  .btn:active { transform:scale(.985) }
  .btn:hover { filter:brightness(.96) }
  .btn-ghost { background:transparent; color:var(--blanc); border:1.5px solid rgba(255,255,255,.35); }
  .btn-ghost:hover { background:rgba(255,255,255,.1) }
  .footer { font-size:10.5px; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:.14em; }
</style>
</head>
<body>
  <div class="logo-chip">
    <img id="logo" src="/assets/feuille_unique.png" alt="Commer&ccedil;ant partenaire">
  </div>
  <div class="card">
    <h1>Merci pour votre participation&nbsp;!</h1>
    <p>Votre r&eacute;ponse est enregistr&eacute;e. D&eacute;couvrez maintenant si vous avez gagn&eacute; un lot chez <strong id="partnerName">votre commer&ccedil;ant partenaire</strong>&nbsp;!</p>
  </div>
  <button class="btn" id="reveal">D&eacute;couvrir le r&eacute;sultat</button>
  <button class="btn btn-ghost" id="partenaires">O&ugrave; trouver nos partenaires</button>
  <div class="footer">Parc naturel p&eacute;riurbain du Jorat</div>
<script>
  const params = new URLSearchParams(location.search);
  const session = params.get('session') || '';
  const slug    = (params.get('partner') || '').trim();

  if (slug) {
    fetch('/partner/' + encodeURIComponent(slug))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (!d) return;
        if (d.nom_complet) document.getElementById('partnerName').textContent = d.nom_complet;
        if (d.logo_url) {
          const img = document.getElementById('logo');
          img.src = d.logo_url;
          img.alt = d.nom_complet || 'Commerçant partenaire';
        }
      })
      .catch(function () {});
  }

  document.getElementById('reveal').addEventListener('click', function () {
    location.href = '/resultat.html?session=' + encodeURIComponent(session);
  });
  document.getElementById('partenaires').addEventListener('click', function () {
    location.href = '/partenaires.html';
  });
</script>
</body>
</html>
