<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Merci &mdash; Concours PNJ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap');

  :root {
    --teal: #1F6481;
    --teal-deep: #16475c;
    --lime: #D7E337;
    --encre: #142228;
    --parchemin: #EDE0BC;
    --blanc: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0 }

  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: var(--teal);
    color: var(--encre);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    gap: 18px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% -10%, rgba(215,227,55,.10) 0%, transparent 45%),
      linear-gradient(180deg, transparent 60%, rgba(20,34,40,.18) 100%);
    pointer-events: none;
  }

  .logo-chip {
    background: var(--blanc);
    border-radius: 12px;
    padding: 10px 16px;
    box-shadow: 0 4px 16px rgba(20,34,40,.25);
    max-width: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-chip img {
    max-height: 48px;
    max-width: 208px;
    width: auto;
    height: auto;
    display: block;
  }

  .bon {
    background: var(--blanc);
    border-radius: 16px;
    max-width: 360px;
    width: 100%;
    padding: 0 0 28px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(20,34,40,.25);
    position: relative;
    overflow: hidden;
  }

  .bon-head {
    background: var(--encre);
    color: var(--blanc);
    padding: 26px 28px 22px;
  }

  .bon-head h1 {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -.01em;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .bon-head .subtitle {
    color: rgba(255,255,255,.72);
    font-size: 13.5px;
    line-height: 1.55;
    font-weight: 400;
  }

  .bon-head .subtitle strong {
    color: var(--lime);
    font-weight: 700;
  }

  .lime-rule {
    height: 4px;
    background: var(--lime);
  }

  .bon-body { padding: 26px 28px 0 }

  #qr {
    width: 208px;
    height: 208px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    border: 2px solid rgba(31,100,129,.18);
    background: var(--blanc);
    padding: 5px;
  }

  #qr canvas, #qr img {
    width: 194px !important;
    height: 194px !important;
  }

  .label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .16em;
    color: var(--teal);
    margin: 22px 0 7px;
    font-weight: 700;
  }

  .code {
    font-size: 31px;
    font-weight: 700;
    letter-spacing: .2em;
    color: var(--teal);
    background: var(--parchemin);
    border-radius: 9px;
    padding: 12px 0;
    text-indent: .2em;
  }

  .hint {
    font-size: 12px;
    color: var(--teal-deep);
    opacity: .7;
    margin-top: 16px;
  }

  .btn {
    max-width: 360px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: transform .1s, filter .15s;
  }

  .btn:active { transform: scale(.985) }
  .btn:disabled { opacity: .45; cursor: default }

  .btn-primary {
    background: var(--lime);
    color: var(--encre);
  }
  .btn-primary:hover:not(:disabled) { filter: brightness(.96) }

  .btn-secondary {
    background: transparent;
    color: var(--blanc);
    border: 1.5px solid rgba(255,255,255,.35);
  }
  .btn-secondary:hover { background: rgba(255,255,255,.1) }

  .footer {
    font-size: 10.5px;
    color: rgba(255,255,255,.5);
    text-transform: uppercase;
    letter-spacing: .14em;
    margin-top: 2px;
  }
</style>
</head>
<body>

  <div class="logo-chip">
    <img id="logo" src="/assets/feuille_unique.png" alt="Commer&ccedil;ant partenaire">
  </div>

  <div class="bon" id="bon">
    <div class="bon-head">
      <h1>Merci pour votre participation&nbsp;!</h1>
      <p class="subtitle">Pr&eacute;sentez ce bon au comptoir de <strong id="partnerName">votre commer&ccedil;ant partenaire</strong> pour tenter votre chance au tirage.</p>
    </div>
    <div class="lime-rule"></div>
    <div class="bon-body">
      <div id="qr"></div>
      <div class="label">Code (secours)</div>
      <div class="code" id="code">------</div>
      <div class="hint">Bon valable une seule fois.</div>
    </div>
  </div>

  <button class="btn btn-primary" id="dl">&#11015; T&eacute;l&eacute;charger le bon</button>
  <div class="footer">Parc naturel p&eacute;riurbain du Jorat</div>

<script>
  const params = new URLSearchParams(location.search);
  const code = (params.get('code') || '').toUpperCase().trim();
  const slug = (params.get('partner') || '').trim();
  const comptoirUrl = 'https://concours.jorapp.org/comptoir?code=' + encodeURIComponent(code);

  document.getElementById('code').textContent = code || '------';

  // QR généré côté client : le code ne transite chez aucun tiers (nLPD)
  if (code) {
    new QRCode(document.getElementById('qr'), {
      text: comptoirUrl, width: 194, height: 194, correctLevel: QRCode.CorrectLevel.M,
      colorDark: '#142228', colorLight: '#ffffff'
    });
  }

  // Récupère le nom + le logo du partenaire via la mini-route (collection commercants non exposée)
  if (slug) {
    fetch('/partner/' + encodeURIComponent(slug))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (!d) return;
        if (d.nom_complet) {
          document.getElementById('partnerName').textContent = d.nom_complet;
        }
        if (d.logo_url) {
          const img = document.getElementById('logo');
          img.src = d.logo_url;
          img.alt = d.nom_complet || 'Commerçant partenaire';
        }
      })
      .catch(function () {});
  }

  // Téléchargement du bon en PNG
  document.getElementById('dl').addEventListener('click', function () {
    const btn = this; btn.disabled = true;
    html2canvas(document.getElementById('bon'), { backgroundColor: '#ffffff', scale: 2 })
      .then(function (canvas) {
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = 'bon-concours-' + (code || 'pnj') + '.png';
        a.click();
        btn.disabled = false;
      })
      .catch(function () { btn.disabled = false; alert('Téléchargement indisponible.'); });
  });

  document.getElementById('partenaires').addEventListener('click', function () {
    window.location.href = '/partenaires.html';
  });
</script>
</body>
</html>
