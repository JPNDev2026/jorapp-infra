<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock PNJ — Panier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/theme.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/print.css" media="print">
</head>
<body>
  <div id="nav-container"></div>

  <main class="container mt-lg mb-xl">
    <h1 class="mb-lg">Panier</h1>
    <div id="cart-content"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.27.0/dist/pocketbase.umd.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/cart.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script>
    (function () {
      StockAuth.checkAuth();
      StockUI.renderNav('panier');

      var container = document.getElementById('cart-content');

      function renderCartItem(item) {
        var subtotal = (item.prix || 0) * item.quantite;
        var priceHtml = item.prix
          ? '<span class="text-sm text-muted">' + StockUI.formatCHF(item.prix) + ' / unité</span>'
          : '';
        var subtotalHtml = item.prix
          ? '<span class="cart-item-subtotal">' + StockUI.formatCHF(subtotal) + '</span>'
          : '';
        var plusDisabled = item.quantite >= item.stock_max ? ' disabled' : '';

        return (
          '<div class="cart-item" data-produit-id="' + item.produit_id + '">' +
            '<span class="cart-item-name">' + StockUI.escapeHtml(item.nom) + '</span>' +
            priceHtml +
            '<div class="qty-selector">' +
              '<button type="button" data-action="minus">' + StockUI.icon('minus', 14) + '</button>' +
              '<span class="qty-value">' + item.quantite + '</span>' +
              '<button type="button" data-action="plus"' + plusDisabled + '>' + StockUI.icon('plus', 14) + '</button>' +
            '</div>' +
            subtotalHtml +
            '<button type="button" class="btn-icon" data-action="remove" aria-label="Supprimer">' + StockUI.icon('trash-2', 16) + '</button>' +
          '</div>'
        );
      }

      function loadCollaborateurs() {
        var select = document.getElementById('collaborateur');
        if (!select) {
          return;
        }
        StockAPI.getCollaborateurs().then(function (collaborateurs) {
          select.innerHTML = '<option value="">Sélectionner…</option>' +
            collaborateurs.map(function (c) {
              return '<option value="' + c.id + '">' + StockUI.escapeHtml(c.nom) + '</option>';
            }).join('');
        });
      }

      function onSubmitValidation(e) {
        e.preventDefault();
        var errorEl = document.getElementById('validate-error');
        errorEl.hidden = true;

        var collaborateurId = document.getElementById('collaborateur').value;
        if (!collaborateurId) {
          errorEl.textContent = 'Merci de sélectionner un collaborateur.';
          errorEl.hidden = false;
          return;
        }

        var description = document.getElementById('description').value.trim();
        var items = StockCart.getItems();
        var count = StockCart.getCount();

        var summaryHtml = '<p>Confirmer le retrait de <strong>' + count + ' article' + (count > 1 ? 's' : '') + '</strong>' +
          (description ? ' pour <strong>' + StockUI.escapeHtml(description) + '</strong>' : '') + ' ?</p>';

        StockUI.showModal('Confirmer la commande', summaryHtml, function () {
          var payload = {
            description: description,
            collaborateur_id: collaborateurId,
            items: items.map(function (item) {
              return { produit_id: item.produit_id, quantite: item.quantite };
            })
          };

          StockAPI.validerCommande(payload)
            .then(function (commande) {
              StockCart.clear();
              window.location.href = '/commande_details.html?id=' + commande.id;
            })
            .catch(function (err) {
              var message = (err && err.data && err.data.message) || (err && err.message) || 'Erreur lors de la validation de la commande.';
              errorEl.textContent = message;
              errorEl.hidden = false;
            });
        });
      }

      function renderCart() {
        var items = StockCart.getItems();

        if (!items.length) {
          container.innerHTML =
            '<div class="card">' +
              StockUI.renderEmptyState('Votre panier est vide.') +
              '<div class="text-center"><a href="/retrait.html" class="btn btn-primary">Aller au retrait →</a></div>' +
            '</div>';
          return;
        }

        var hasPrices = items.some(function (item) { return item.prix > 0; });
        var itemsHtml = items.map(renderCartItem).join('');
        var totalHtml = hasPrices
          ? '<div class="cart-total-row"><span>Total</span><span>' + StockUI.formatCHF(StockCart.getTotal()) + '</span></div>'
          : '';

        container.innerHTML =
          '<div class="card mb-lg">' +
            '<div class="cart-list">' + itemsHtml + '</div>' +
            totalHtml +
          '</div>' +
          '<div class="card">' +
            '<form id="validate-form">' +
              '<div class="form-group">' +
                '<label for="description">Description / Événement</label>' +
                '<input type="text" id="description" class="input" placeholder="Ex: Festi\'Jorat 2026">' +
              '</div>' +
              '<div class="form-group">' +
                '<label for="collaborateur">Collaborateur</label>' +
                '<select id="collaborateur" class="select" required></select>' +
              '</div>' +
              '<p id="validate-error" class="alert alert-danger" hidden></p>' +
              '<button type="submit" class="btn btn-primary btn-block">Valider la commande</button>' +
            '</form>' +
          '</div>';

        loadCollaborateurs();
        document.getElementById('validate-form').addEventListener('submit', onSubmitValidation);
      }

      container.addEventListener('click', function (e) {
        var btn = e.target.closest('button[data-action]');
        if (!btn) {
          return;
        }
        var itemEl = btn.closest('.cart-item');
        if (!itemEl) {
          return;
        }
        var produitId = itemEl.getAttribute('data-produit-id');
        var item = StockCart.getItems().find(function (i) { return i.produit_id === produitId; });
        if (!item) {
          return;
        }
        var action = btn.getAttribute('data-action');

        if (action === 'minus') {
          StockCart.updateQuantity(produitId, item.quantite - 1);
        } else if (action === 'plus') {
          StockCart.updateQuantity(produitId, item.quantite + 1);
        } else if (action === 'remove') {
          StockCart.removeItem(produitId);
        }
      });

      window.addEventListener('cart-updated', renderCart);

      renderCart();
    })();
  </script>
</body>
</html>
