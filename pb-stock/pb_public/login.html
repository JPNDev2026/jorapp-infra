<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock JPN — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/theme.css">
  <link rel="stylesheet" href="/assets/css/components.css">
</head>
<body class="login-page">
  <div class="card login-card">
    <img class="login-logo" src="/assets/img/Logo_feuille.png" alt="Logo JPN">
    <h1>Stock JPN</h1>

    <form id="login-form">
      <div class="form-group">
        <label for="password" class="visually-hidden">Mot de passe</label>
        <input type="password" id="password" class="input" placeholder="Mot de passe" autocomplete="current-password" required autofocus>
      </div>

      <p id="login-error" class="alert alert-danger" hidden></p>

      <button type="submit" class="btn btn-primary">Entrer</button>
    </form>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script>
    (function () {
      if (StockAuth.isAuthenticated()) {
        window.location.href = '/index.html';
        return;
      }

      var form = document.getElementById('login-form');
      var errorEl = document.getElementById('login-error');

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        errorEl.hidden = true;
        var password = document.getElementById('password').value;
        StockAuth.login(password);
      });
    })();
  </script>
</body>
</html>
