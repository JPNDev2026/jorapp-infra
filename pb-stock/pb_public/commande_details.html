<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock JPN — Détail commande</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/theme.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/print.css" media="print">
</head>
<body>
  <div id="nav-container"></div>

  <main class="container mt-lg mb-xl">
    <div id="commande-content"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.27.0/dist/pocketbase.umd.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/cart.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script>
    (function () {
      StockAuth.checkAuth();
      // Sous-page : aucun item de nav actif
      StockUI.renderNav('');

      var container = document.getElementById('commande-content');
      var params = new URLSearchParams(window.location.search);
      var commandeId = params.get('id');
      var returningItemId = null;
      var currentCommande = null;

      function renderRow(item) {
        var produitNom = (item.expand && item.expand.produit) ? StockUI.escapeHtml(item.expand.produit.nom) : '—';
        var prixHtml = item.prix_unitaire ? StockUI.formatCHF(item.prix_unitaire) : '—';
        var subtotalHtml = item.prix_unitaire ? StockUI.formatCHF(item.prix_unitaire * item.quantite) : '—';

        var retourne = item.quantite_retournee || 0;
        var restant = item.quantite - retourne;
        var retourneHtml = retourne > 0 ? (retourne + ' / ' + item.quantite) : '—';

        var actionHtml;
        if (restant <= 0) {
          actionHtml = '<span class="text-sm text-muted">Tout retourné</span>';
        } else if (returningItemId === item.id) {
          actionHtml =
            '<div class="qty-inline">' +
              '<input type="number" min="1" max="' + restant + '" class="input" id="retour-input" value="' + restant + '">' +
              '<button type="button" class="btn btn-primary btn-sm" data-action="confirm-retour" data-item-id="' + item.id + '">' + StockUI.icon('check', 14) + '</button>' +
              '<button type="button" class="btn btn-outline btn-sm" data-action="cancel-retour">' + StockUI.icon('x', 14) + '</button>' +
            '</div>';
        } else {
          actionHtml = '<button type="button" class="btn btn-outline btn-sm" data-action="start-retour" data-item-id="' + item.id + '">Retour</button>';
        }

        return (
          '<tr>' +
            '<td data-label="Produit">' + produitNom + '</td>' +
            '<td data-label="Quantité">' + item.quantite + '</td>' +
            '<td data-label="Retourné">' + retourneHtml + '</td>' +
            '<td data-label="Prix unitaire">' + prixHtml + '</td>' +
            '<td data-label="Sous-total">' + subtotalHtml + '</td>' +
            '<td data-label="Retour" class="no-print">' + actionHtml + '</td>' +
          '</tr>'
        );
      }

      function renderCommande(commande) {
        currentCommande = commande;
        var collaborateur = (commande.expand && commande.expand.collaborateur) ? StockUI.escapeHtml(commande.expand.collaborateur.nom) : '—';
        var description = commande.description ? StockUI.escapeHtml(commande.description) : '—';
        var items = (commande.expand && commande.expand.commande_items_via_commande) || [];
        var hasPrices = items.some(function (item) { return item.prix_unitaire; });

        var rowsHtml = items.map(renderRow).join('');

        var total = items.reduce(function (sum, item) {
          return sum + (item.prix_unitaire || 0) * item.quantite;
        }, 0);

        var totalHtml = hasPrices
          ? '<div class="cart-total-row"><span>Total</span><span>' + StockUI.formatCHF(total) + '</span></div>'
          : '';

        container.innerHTML =
          '<div class="card mb-lg">' +
            '<div class="product-card-row mb-sm">' +
              '<h2>' + StockUI.escapeHtml(commande.numero) + '</h2>' +
              '<span class="text-muted">' + StockUI.formatDate(commande.date_commande) + '</span>' +
            '</div>' +
            '<p><strong>Événement :</strong> ' + description + '</p>' +
            '<p><strong>Collaborateur :</strong> ' + collaborateur + '</p>' +
          '</div>' +
          '<div class="card mb-lg">' +
            '<table class="table table-responsive">' +
              '<thead><tr><th>Produit</th><th>Quantité</th><th>Retourné</th><th>Prix unitaire</th><th>Sous-total</th><th class="no-print">Retour</th></tr></thead>' +
              '<tbody>' + rowsHtml + '</tbody>' +
            '</table>' +
            totalHtml +
          '</div>' +
          '<div class="flex mb-xl">' +
            '<button type="button" class="btn btn-primary" id="print-btn">Imprimer</button>' +
            '<a href="/commandes.html" class="btn btn-outline">Retour aux commandes</a>' +
          '</div>';

        document.getElementById('print-btn').addEventListener('click', function () {
          window.print();
        });
      }

      function loadAndRender() {
        StockAPI.getCommande(commandeId)
          .then(renderCommande)
          .catch(function () {
            container.innerHTML = StockUI.renderEmptyState('Commande introuvable.');
          });
      }

      container.addEventListener('click', function (e) {
        var target = e.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');

        if (action === 'start-retour') {
          returningItemId = target.getAttribute('data-item-id');
          renderCommande(currentCommande);
        } else if (action === 'cancel-retour') {
          returningItemId = null;
          renderCommande(currentCommande);
        } else if (action === 'confirm-retour') {
          var itemId = target.getAttribute('data-item-id');
          var input = document.getElementById('retour-input');
          var qty = parseInt(input.value, 10);
          if (isNaN(qty) || qty <= 0) {
            return;
          }
          StockAPI.retournerItem(itemId, qty)
            .then(function () {
              returningItemId = null;
              StockUI.showToast('Retour enregistré : ' + qty + ' unité(s) remise(s) en stock.');
              loadAndRender();
            })
            .catch(function (err) {
              var message = (err && err.data && err.data.message) || (err && err.message) || 'Erreur lors de l\'enregistrement du retour.';
              StockUI.showToast(message, 'error');
            });
        }
      });

      if (!commandeId) {
        container.innerHTML = StockUI.renderEmptyState('Commande introuvable.');
      } else {
        loadAndRender();
      }
    })();
  </script>
</body>
</html>
